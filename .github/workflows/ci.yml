name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --all-targets --verbose
      # Experimental, feature-gated MusicXML reader (default build stays dep-free).
      - run: cargo test -p croma-core --features musicxml-reader
      - run: cargo clippy -p croma-core --all-targets --features musicxml-reader -- -D warnings
      - name: croma-core default build stays zero-dep
        run: |
          lines=$(cargo tree -p croma-core --edges normal | wc -l | tr -d ' ')
          test "$lines" = "1" || { echo "croma-core gained a normal dependency:"; cargo tree -p croma-core --edges normal; exit 1; }

  linux-nix:
    name: Linux (nixos-unstable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nixos-unstable
      - name: Build dev shell
        run: nix build --no-link .#devShells.x86_64-linux.default
      - run: nix develop --command cargo fmt --all --check
      - run: nix develop --command cargo test --workspace
      - run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - run: nix develop --command cargo build --workspace --all-targets --verbose
      # Experimental, feature-gated MusicXML reader (default build stays dep-free).
      - run: nix develop --command cargo test -p croma-core --features musicxml-reader
      - run: nix develop --command cargo clippy -p croma-core --all-targets --features musicxml-reader -- -D warnings
